<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Edit Gist {{ gist_id }} - {{ filename }}</title>
  <link rel="stylesheet" href="/static/gistmd.css"/>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; margin: 0; padding: 1rem; background: #f6f8fa; }
    .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .header h1 { margin: 0; font-size: 1.5rem; }
    .header a { color: #0366d6; text-decoration: none; }
    .header a:hover { text-decoration: underline; }
    .container { display: grid; grid-template-columns: 1fr 400px; gap: 1rem; max-width: 1400px; margin: 0 auto; }
    .panel { background: white; border-radius: 8px; border: 1px solid #d0d7de; overflow: hidden; }
    .panel-header { padding: 0.75rem 1rem; border-bottom: 1px solid #d0d7de; background: #f6f8fa; font-weight: 600; }
    .panel-body { padding: 1rem; }
    textarea { width: 100%; height: 60vh; font-family: monospace; border: none; resize: vertical; padding: 0; }
    textarea:focus { outline: none; }
    .markdown-body { height: 60vh; overflow-y: auto; padding: 1rem; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { border-bottom: 1px solid #d0d7de; padding-bottom: 0.3em; }
    .markdown-body code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 3px; }
    .markdown-body pre { background: #f6f8fa; padding: 1rem; border-radius: 6px; overflow-x: auto; }
    .markdown-body pre code { background: none; padding: 0; }
    .gist-embed { height: 60vh; border: none; width: 100%; }
    .form-row { margin-bottom: 0.75rem; }
    .form-row input { width: 100%; padding: 0.5rem; border: 1px solid #d0d7de; border-radius: 6px; }
    .btn { padding: 0.5rem 1rem; background: #2da44e; color: white; border: none; border-radius: 6px; cursor: pointer; }
    .btn:hover { background: #2c974b; }
    .tab-bar { display: flex; border-bottom: 1px solid #d0d7de; background: #f6f8fa; }
    .tab { padding: 0.75rem 1rem; cursor: pointer; border: none; background: none; }
    .tab.active { background: white; border-bottom: 2px solid #f78166; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; }
      .gist-embed, .markdown-body { height: 300px; }
      textarea { height: 300px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Edit: {{ filename }}</h1>
    {% if gist_url %}
    <a href="{{ gist_url }}" target="_blank" id="gist-link">{{ gist_url }}</a>
    {% endif %}
  </div>

  <div class="container">
    <div class="panel">
      <div class="tab-bar">
        <button class="tab active" onclick="switchTab('editor')">Editor</button>
        <button class="tab" onclick="switchTab('preview')">Preview</button>
      </div>

      <form method="post" action="/save/{{ gist_id }}" id="save-form">
        <div id="tab-editor" class="tab-content active">
          <div class="form-row">
            <input type="text" name="filename" value="{{ filename }}" placeholder="Filename"/>
          </div>
          <textarea name="content" id="content" rows="20">{{ content | e }}</textarea>
        </div>
        <div id="tab-preview" class="tab-content">
          <div class="markdown-body" id="preview">{{ rendered | safe }}</div>
        </div>
        <div class="form-row panel-body">
          <input type="text" name="description" placeholder="Description (optional)"/>
          <button type="submit" class="btn">Save to Gist</button>
        </div>
      </form>
    </div>

    <div class="panel">
      <div class="panel-header">Gist on gist.github.com</div>
      <div class="panel-body" style="padding: 0;">
        {% if gist_url %}
        <iframe src="{{ gist_url }}" class="gist-embed" id="gist-frame"></iframe>
        {% else %}
        <p style="padding: 1rem; color: #666;">No gist URL available</p>
        {% endif %}
      </div>
    </div>
  </div>

  <script>
    const ta = document.getElementById("content");
    const preview = document.getElementById("preview");
    let timeout = null;

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      event.target.classList.add('active');
    }

    ta.addEventListener("input", () => {
      if (timeout) clearTimeout(timeout);
      timeout = setTimeout(() => {
        fetch("/__render", {method:"POST", body: ta.value}).then(r=>r.text()).then(html=>preview.innerHTML=html);
      }, 300);
    });

    document.getElementById("save-form").addEventListener("submit", () => {
      const saved = confirm("Save changes to Gist?");
      if (!saved) event.preventDefault();
    });
  </script>
</body>
</html>
